_format_version: "3.0"
_transform: true

consumers:
  - username: frontend
    jwt_secrets:
      - algorithm: HS256
        key: access
        secret: dev-secret

services:
  - name: payment-service
    url: http://payment-service:5000
    routes:
      - name: payment-health-route
        paths:
          - /api/payments/health
        strip_path: false
      - name: payment-route
        paths:
          - /api/payments
        strip_path: false
        plugins:
          - name: cors
            config:
              origins:
                - http://localhost:3000
                - http://127.0.0.1:3000
              methods:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - OPTIONS
              headers:
                - Authorization
                - Content-Type
              credentials: true
              max_age: 3600
          - name: jwt
            config:
              header_names:
                - authorization
              key_claim_name: type
              claims_to_verify:
                - exp
              run_on_preflight: false
  - name: auth-service
    url: http://auth-service:5001
    routes:
      - name: auth-route
        paths:
          - /api/auth
        strip_path: false
        plugins:
          - name: cors
            config:
              origins:
                - http://localhost:3000
                - http://127.0.0.1:3000
              methods:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - OPTIONS
              headers:
                - Authorization
                - Content-Type
              credentials: true
              max_age: 3600
  - name: user-service
    url: http://user-service:5002
    routes:
      - name: user-health-route
        paths:
          - /api/users/health
        strip_path: false
      - name: user-route
        paths:
          - /api/users
        strip_path: false
        plugins:
          - name: cors
            config:
              origins:
                - http://localhost:3000
                - http://127.0.0.1:3000
              methods:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - OPTIONS
              headers:
                - Authorization
                - Content-Type
              credentials: true
              max_age: 3600
          - name: jwt
            config:
              header_names:
                - authorization
              key_claim_name: type
              claims_to_verify:
                - exp
              run_on_preflight: false