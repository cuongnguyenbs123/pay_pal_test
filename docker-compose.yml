services:
  db:
    image: mongo:7
    container_name: paypal_mongo
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  payment-service:
    build: ./payment-service
    env_file:
      - payment-service/.env
    environment:
      - MONGODB_URI=mongodb://db:27017/payment_db
    depends_on:
      db:
        condition: service_healthy
  auth-service:
    build: ./auth-service
    env_file:
      - auth-service/.env
    environment:
      - MONGODB_URI=mongodb://db:27017/auth_db
      - JWT_SECRET=dev-secret
    depends_on:
      db:
        condition: service_healthy
  user-service:
    build: ./user-service
    env_file:
      - user-service/.env
    environment:
      - MONGODB_URI=mongodb://db:27017/user_db
      - JWT_SECRET=dev-secret
    depends_on:
      db:
        condition: service_healthy
  app:
    build:
      context: ./client
      args:
        - REACT_APP_API_URL=http://localhost:8000
    env_file:
      - client/.env
    ports:
      - "3000:80"
    depends_on:
      - payment-service
      - auth-service
      - user-service
  kong:
    container_name: kong_gateway
    image: kong:3.4
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - payment-service
      - auth-service
      - user-service